volumes:
  krakenkey_local_db:
    driver: local
  krakenkey_local_redis:
    driver: local

networks:
  krakenkey-local:
    name: krakenkey-local
    driver: bridge

services:
  # Dev workspace — VS Code connects here.
  # Run API and frontend as separate terminal processes:
  #   cd /workspaces/app/backend  && yarn start:dev
  #   cd /workspaces/app/frontend && yarn dev --host
  node:
    build:
      context: .
      dockerfile: Dockerfile
    image: krakenkey-dev:local
    container_name: kk-local-dev
    command: sleep infinity
    env_file:
      - ./env/api.env
      - ./env/api-local-overrides.env
    volumes:
      - ..:/workspaces
    working_dir: /workspaces
    networks:
      - krakenkey-local
    labels:
      # --- API routing ---
      - "traefik.enable=true"
      - "traefik.http.routers.krakenkey-api.rule=Host(`api-dev.krakenkey.io`)"
      - "traefik.http.routers.krakenkey-api.entrypoints=websecure"
      - "traefik.http.routers.krakenkey-api.tls=true"
      - "traefik.http.routers.krakenkey-api.service=krakenkey-api"
      - "traefik.http.services.krakenkey-api.loadbalancer.server.port=8080"
      # --- Web routing ---
      - "traefik.http.routers.krakenkey-web.rule=Host(`dev.krakenkey.io`)"
      - "traefik.http.routers.krakenkey-web.entrypoints=websecure"
      - "traefik.http.routers.krakenkey-web.tls=true"
      - "traefik.http.routers.krakenkey-web.service=krakenkey-web"
      - "traefik.http.services.krakenkey-web.loadbalancer.server.port=5173"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Traefik reverse proxy — TLS termination on :443, mirrors remote setup.
  traefik:
    image: traefik:v3.6.7
    container_name: kk-local-traefik
    command:
      - "--configfile=/etc/traefik/config.yaml"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/config.yaml:/etc/traefik/config.yaml:ro
      - ./traefik/dynamic.yaml:/etc/traefik/dynamic.yaml:ro
      - ../infra/docker/certs/local:/certs:ro
    networks:
      - krakenkey-local
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  postgres:
    image: postgres:18-alpine
    container_name: kk-local-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: krakenkey
    volumes:
      - krakenkey_local_db:/var/lib/postgresql/data
    networks:
      - krakenkey-local
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6-rc1-trixie
    container_name: kk-local-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - krakenkey_local_redis:/data
    networks:
      - krakenkey-local
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
