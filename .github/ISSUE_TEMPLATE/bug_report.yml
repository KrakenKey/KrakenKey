name: Bug Report
description: Report a bug or unexpected behavior in KrakenKey
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of KrakenKey is affected?
      options:
        - Dashboard (Web UI)
        - REST API
        - Certificate Issuance
        - Domain Verification
        - Authentication
        - Local Development / DevContainer
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: using
    attributes:
      label: How are you using KrakenKey?
      options:
        - Managed service (krakenkey.io)
        - Self-hosted
        - Local development (contributor)
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, or relevant environment details.
      placeholder: |
        - Browser: Chrome 120
        - OS: macOS 14.2
      render: markdown

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant log output or error messages.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, screenshots, or details.
